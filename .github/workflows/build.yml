name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: cp .env.example .env

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun Cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Next.js Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Cache Docker Images
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: ~/docker-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('docker-compose.yml') }}

      - name: Load Cached Docker Images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          if [ -f ~/docker-cache/images.tar ]; then
            docker load -i ~/docker-cache/images.tar
          fi

      - name: Pull Docker Images
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker compose pull
          mkdir -p ~/docker-cache
          # Save images to a single tarball for the cache
          docker save $(docker compose config --images) -o ~/docker-cache/images.tar

      - name: Start Docker Services
        run: docker compose up -d

      - name: Wait for Services
        run: sleep 5

      - name: Run Build
        run: bun run build