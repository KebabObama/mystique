services:
  traefik:
    image: traefik:v3.0
    container_name: mystique_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

  app:
    build: .
    container_name: mystique_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
      - migrate
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mystique.rule=Host(`mystique.prazakl.cz`)"
      - "traefik.http.routers.mystique.entrypoints=websecure"
      - "traefik.http.routers.mystique.tls.certresolver=le"
      - "traefik.http.services.mystique.loadbalancer.server.port=3000"

  migrate:
    image: oven/bun:1.1
    container_name: mystique_migrate
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: sh -c "bun install && bun run db:push"

  postgres:
    image: postgres:latest
    container_name: mystique_postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio
    container_name: mystique_minio
    restart: unless-stopped
    ports:
      - "${S3_PORT}:9000"
      - "${S3_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${S3_ROOT_PASSWORD}
    command: server /data --console-address ":${S3_CONSOLE_PORT}"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: