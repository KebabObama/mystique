services:
  nginx:
    image: nginx:alpine
    container_name: mystique_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./letsencrypt:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    container_name: mystique_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt

  certbot-renew:
    image: certbot/certbot:latest
    container_name: mystique_certbot_renew
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

  app:
    build: .
    container_name: mystique_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
      - migrate

  migrate:
    image: oven/bun:1.1
    container_name: mystique_migrate
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: sh -c "bun install && bun run db:push"

  postgres:
    image: postgres:latest
    container_name: mystique_postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio
    container_name: mystique_minio
    restart: unless-stopped
    ports:
      - "${S3_PORT}:9000"
      - "${S3_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${S3_ROOT_PASSWORD}
    command: server /data --console-address ":${S3_CONSOLE_PORT}"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
